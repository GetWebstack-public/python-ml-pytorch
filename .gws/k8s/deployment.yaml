apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ml-pytorch
  namespace: getwebstack
  labels:
    app: python-ml-pytorch
    component: web
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-ml-pytorch
  template:
    metadata:
      labels:
        app: python-ml-pytorch
        component: web
        environment: development
    spec:
      containers:
      - name: python-ml-pytorch
        image: python-ml-pytorch
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      restartPolicy: Always
